/** 列表项：key 为 YYYY-MM-DD 中的「日」数字字符串（无前导零，如 7），val 为数值 */
message SomniBaselineFusionKeyValInt32 {
  string key = 1;
  int32 val = 2;
}

/** 列表项：key 同上；val 为是否有日程 */
message SomniBaselineFusionKeyValBool {
  string key = 1;
  bool val = 2;
}

/** 融合数据：14 天步数序列及 14 天总步数 */
message SomniBaselineFusionSteps {
  repeated SomniBaselineFusionKeyValInt32 list = 1;
  int32 total_steps = 2;
}

/** 融合数据：14 天是否当日有日历/日程记录 */
message SomniBaselineFusionCalendar {
  repeated SomniBaselineFusionKeyValBool list = 1;
}

/** 融合数据：基准日单日预报（和风 daily 一条）；无配置密钥或失败时各 string 为空 */
message SomniBaselineFusionWeather {
  string fx_date = 1;          // 预报日期
  string temp_max = 2;         // 最高温度
  string temp_min = 3;         // 最低温度
  string icon = 4;             // 天气图标（根据时间返回日间/夜间）
  string precip = 5;           // 降水量 mm
  string uv_index = 6;         // 紫外线指数
  string humidity = 7;         // 相对湿度 %
  string pressure = 8;         // 气压 hPa
  string vis = 9;              // 能见度 km
  string wind_dir = 10;        // 风向（根据时间返回日间/夜间）
  string wind_scale = 11;      // 风力等级（根据时间返回日间/夜间）
  string light_intensity = 12; // 光照强度（根据 UV 指数映射）
  string aqi = 13;             // 空气质量指数
  string aqi_category = 14;    // 空气质量类别（根据 AQI 映射）
  string sunrise = 15;         // 日出时间
  string sunset = 16;          // 日落时间
}

/** 融合数据：14 天分数序列 + 基准日当天分数 */
message SomniBaselineFusionScore {
  repeated SomniBaselineFusionKeyValInt32 list = 1;
  int32 today = 2;
}

/** GetBaseline 融合块：步数、日历、天气、分数（list 顺序与 date_strings 一致） */
message SomniBaselineFusionDaily {
  SomniBaselineFusionSteps steps = 1;
  SomniBaselineFusionCalendar calendar = 2;
  SomniBaselineFusionWeather weather = 3;
  SomniBaselineFusionScore score = 4;
}

message SomniGetFusionReq {
  string uid      = 1;
  string date     = 2;  // YYYY-MM-DD，可选
  string language = 3;  // 语言标识，默认 zh
}

message SomniGetFusionRes {
  string ai_insight = 1;   // JSON
  string schedules  = 2;   // JSON 数组
}

message SomniGetBaselineReq {
  string uid      = 1;
  string date     = 2;  // YYYY-MM-DD，可选，默认当天
  string language = 3;  // 语言标识，默认 zh
  /** 和风 location：LocationID 或「经度,纬度」；空则服务端默认（如北京 101010100） */
  string location = 4;
  /** /app/quiz/chat 完成态返回的 session_id；用于读取问卷 user_profile 缓存覆盖 avg 作息 */
  string session_id = 5;
}

message SomniGetBaselineRes {
  string ai_insight   = 1;  // JSON
  string date_strings = 2;  // JSON 数组，14 天日期
  string records      = 3;  // JSON 数组
  string schedules    = 4;  // JSON 数组
  SomniBaselineFusionDaily fusion_daily = 5;
  /** 问卷缓存 usual_sleep_wake_time.sleep_time；空则 BFF 用 14 天记录计算 */
  string quiz_avg_bedtime = 6;
  /** 问卷缓存 usual_sleep_wake_time.wake_time；空则 BFF 用 14 天记录计算 */
  string quiz_avg_wake_time = 7;
}

