syntax = "proto3";

package bionode.comm.v1;

import "bionode_common.proto";

// ============================================================
//  Comm Service — 通用业务微服务
//  端口: gRPC :50062
//  包含: QuizService / SurveyService / ShareService / EventService
// ============================================================

// ==================== QuizService ====================
// 题库管理（全局题目池）
// 对应表: quiz_questions

service QuizService {
  rpc GetActiveQuestions (GetActiveQuestionsReq)  returns (QuestionListRes);
  rpc ListQuestions (ListQuestionsReq)            returns (QuestionListRes);
  rpc GetQuestion (IdReq)                         returns (QuestionRes);
  rpc CreateQuestion (CreateQuestionReq)          returns (QuestionRes);
  rpc UpdateQuestion (UpdateQuestionReq)          returns (QuestionRes);
  rpc UpdateQuestionStatus (UpdateQuestionStatusReq) returns (EmptyRes);
  rpc DeleteQuestion (IdReq)                      returns (EmptyRes);

  // ----- 人格配置 -----
  rpc GetPersonality (GetPersonalityReq)          returns (PersonalityRes);
  rpc GetPersonalityById (IdReq)                  returns (PersonalityRes);
  rpc ListPersonalities (ListPersonalitiesReq)    returns (PersonalityListRes);
  rpc CreatePersonality (CreatePersonalityReq)    returns (PersonalityRes);
  rpc UpdatePersonality (UpdatePersonalityReq)    returns (PersonalityRes);
  rpc UpdatePersonalityStatus (UpdatePersonalityStatusReq) returns (EmptyRes);
  rpc UpdatePersonalityPeriods (UpdatePersonalityPeriodsReq) returns (EmptyRes);
  rpc DeletePersonality (IdReq)                   returns (EmptyRes);
  rpc GetDistinctMhrCodes (EmptyRes)               returns (MhrCodesRes);
}

message MhrCodesRes {
  repeated string codes = 1;
}

// ==================== SurveyService ====================
// 问卷编排 + 答题 + 结果
// 对应表: quiz_surveys, quiz_answers, quiz_results

service SurveyService {
  // ----- 问卷编排 -----
  rpc GetSurvey (GetSurveyReq)                    returns (SurveyRes);
  rpc GetSurveyByCode (GetSurveyByCodeReq)        returns (SurveyRes);
  rpc ListSurveys (ListSurveysReq)                returns (SurveyListRes);
  rpc CreateSurvey (CreateSurveyReq)              returns (SurveyRes);
  rpc UpdateSurvey (UpdateSurveyReq)              returns (SurveyRes);
  rpc UpdateSurveyStatus (UpdateSurveyStatusReq)  returns (EmptyRes);
  rpc DeleteSurvey (IdReq)                        returns (EmptyRes);

  // ----- 获取问卷完整题目（H5 拉取用） -----
  rpc GetSurveyWithQuestions (GetSurveyByCodeReq) returns (SurveyWithQuestionsRes);

  // ----- 答题 -----
  rpc SaveAnswer (SaveAnswerReq)                  returns (AnswerRes);
  rpc SaveAnswerAlways (SaveAnswerReq)            returns (AnswerRes);  // 不按天去重，每次新建（App/Somni 用）
  rpc GetAnswerProgress (GetAnswerProgressReq)    returns (AnswerRes);
  rpc ListAnswers (ListAnswersReq)                returns (AnswerListRes);

  // ----- 测评结果 -----
  rpc ComputeMhrCodes (ComputeMhrCodesReq)        returns (ComputeMhrCodesRes);  // 仅计算人格编码，不落库（Somni 匿名提交用）
  rpc SubmitQuiz (SubmitQuizReq)                  returns (QuizResultRes);
  rpc GetLatestResult (GetLatestResultReq)        returns (QuizResultRes);
  rpc GetResultById (GetResultByIdReq)             returns (QuizResultRes);
  rpc ListResults (ListResultsReq)                returns (QuizResultListRes);
}

// ==================== ShareService ====================
// 分享追踪
// 对应表: shares, share_visits

service ShareService {
  rpc CreateShare (CreateShareReq)                returns (ShareRes);
  rpc GetShareLanding (GetShareLandingReq)        returns (ShareLandingRes);
  rpc RecordVisit (RecordVisitReq)                returns (EmptyRes);
  rpc ListShareTracking (ListShareTrackingReq)    returns (ShareTrackingListRes);
  
  // ----- Admin 运营管理 -----
  rpc ListSharerRanking (ListSharerRankingReq)    returns (SharerRankingListRes);
  rpc ListSharesByUser (ListSharesByUserReq)      returns (ShareListRes);
  rpc ListShareVisits (ListShareVisitsReq)        returns (ShareVisitListRes);
}

// ==================== EventService ====================
// 埋点日志与数据统计
// 对应表: log_events

service EventService {
  rpc TrackEvent (TrackEventReq)                  returns (EmptyRes);
  rpc BatchTrack (BatchTrackReq)                  returns (EmptyRes);
  rpc GetOverview (GetOverviewReq)                returns (OverviewRes);
  rpc GetPageViewUV (GetPageViewUVReq)            returns (CountRes);
  rpc GetQuizCompleteUV (GetQuizCompleteUVReq)    returns (CountRes);
  rpc GetInteractionCount (GetInteractionCountReq) returns (CountRes);
  rpc ListLogEvents (ListLogEventsReq)            returns (ListLogEventsRes);
  rpc GetEventTrend (GetEventTrendReq)            returns (EventTrendRes);
  rpc GetEventFilterOptions (GetEventFilterOptionsReq) returns (EventFilterOptionsRes);
}

// ==================== SomniService ====================
// 睡眠报告、方案、基线、融合数据
// 对应表: somni_*（报告、会话、方案、事件、生理、环境等）

service SomniService {
  rpc SetAlarm (SomniSetAlarmReq)       returns (SomniSetAlarmRes);
  rpc GetPlan (SomniGetPlanReq)        returns (SomniGetPlanRes);
  rpc MarkPlanStarted (SomniMarkPlanStartedReq) returns (SomniMarkPlanStartedRes);
  rpc MarkPlanStopped (SomniMarkPlanStoppedReq) returns (SomniMarkPlanStoppedRes);
  /** App 伴睡开始：comm 编排绑定设备 + device-gateway StartSession（scheme_v1 → MQTT 在网关转换） */
  rpc StartSomniDeviceSession (SomniStartSomniDeviceSessionReq) returns (SomniStartSomniDeviceSessionRes);
  /** App 伴睡结束：停会话、解绑 */
  rpc StopSomniDeviceSession (SomniStopSomniDeviceSessionReq) returns (SomniStopSomniDeviceSessionRes);
  rpc GetFusion (SomniGetFusionReq)     returns (SomniGetFusionRes);
  rpc GetBaseline (SomniGetBaselineReq) returns (SomniGetBaselineRes);
  rpc GetReport (SomniGetReportReq)     returns (SomniGetReportRes);
  /** 睡眠星球详情：record_date 空则按服务端当日（UTC 日历，与 GetReport 一致） */
  rpc GetSleepPlanet (SomniGetSleepPlanetReq) returns (SomniGetSleepPlanetRes);
  /** 睡眠星球列表，按 record_date 倒序分页 */
  rpc ListSleepPlanets (SomniListSleepPlanetsReq) returns (SomniListSleepPlanetsRes);
  rpc ValidateMonitorSession (SomniValidateMonitorSessionReq) returns (SomniValidateMonitorSessionRes);
  rpc GetMonitorPayload (SomniGetMonitorPayloadReq) returns (SomniGetMonitorPayloadRes);
  rpc GetUidByMhrCodes (SomniGetUidByMhrCodesReq) returns (SomniGetUidByMhrCodesRes);
  rpc CreateQuizSession (SomniCreateQuizSessionReq) returns (SomniCreateQuizSessionRes);
  /** 问卷提交后：Redis 覆盖当前 X-App-Instance-Id 对应的映射 uid */
  rpc UpsertSomniAppInstUser (SomniUpsertSomniAppInstUserReq) returns (SomniUpsertSomniAppInstUserRes);
  /** 设备解绑时：删除 Redis 中该实例的 quiz_uid 映射 */
  rpc DeleteSomniAppInstUser (SomniDeleteSomniAppInstUserReq) returns (SomniUpsertSomniAppInstUserRes);
  /** Somni Quiz AI 对话问卷（comm 编排 Init/Chat、Redis 快照；finalized 后等价 submit 落库） */
  rpc SomniQuizChat (SomniQuizChatReq) returns (SomniQuizChatRes);

  // ----- 干预配置 CRUD -----
  rpc ListInterventionConfigs (ListInterventionConfigsReq) returns (InterventionConfigListRes);
  rpc GetInterventionConfig (IdReq) returns (InterventionConfigRes);
  rpc UpsertInterventionConfig (UpsertInterventionConfigReq) returns (InterventionConfigRes);
  rpc DeleteInterventionConfig (IdReq) returns (EmptyRes);

  // ----- 监控页查询接口 -----
  rpc GetPlanPhases (SomniGetPlanPhasesReq) returns (SomniGetPlanPhasesRes);
  rpc GetInterventionEvents (SomniGetInterventionEventsReq) returns (SomniGetInterventionEventsRes);
  rpc GetMonitorReportData (SomniGetMonitorReportDataReq) returns (SomniGetMonitorReportDataRes);
  /** 监控端睡眠报告：调用 DPH ProcessRadarReport 生成真/假两份报告并写入 Redis 缓存 */
  rpc GenerateMonitorDphReports (SomniGenerateMonitorDphReportsReq) returns (SomniGenerateMonitorDphReportsRes);

  // ----- 控制台会话上下文 -----
  /** 根据 session_id 查询会话关联的人格编码和方案阶段，供控制台接管 APP 会话时加载 */
  rpc GetSessionContext (SomniGetSessionContextReq) returns (SomniGetSessionContextRes);

  // ----- 控制台手动干预 -----
  rpc TriggerIntervention (TriggerInterventionReq) returns (EmptyRes);
  rpc StopIntervention (StopInterventionReq) returns (EmptyRes);

  // ----- 对话记录查询 -----
  rpc GetChatMessages (GetChatMessagesReq)                returns (ChatMessageListRes);
  rpc ListChatConversations (ListChatConversationsReq)    returns (ChatConversationListRes);
  rpc ListUserChatConversations (ListUserChatConversationsReq) returns (ChatConversationListRes);

  // ----- 临时方案 -----
  rpc GetTempPlan (SomniGetTempPlanReq) returns (SomniGetTempPlanRes);

  // ----- Somni 对话音频上传 -----
  rpc UploadChatAudio (UploadChatAudioReq) returns (UploadChatAudioRes);

  // ----- Somni 对话消息落库 -----
  rpc AppendChatMessage (AppendChatMessageReq) returns (EmptyRes);

  // ----- 睡眠地图（预设区级聚合 + 个人分析） -----
  rpc GetSleepMapCityOverview (SomniGetSleepMapCityOverviewReq) returns (SomniGetSleepMapCityOverviewRes);
  rpc GetSleepMapHighlights (SomniGetSleepMapHighlightsReq) returns (SomniGetSleepMapHighlightsRes);
  rpc GetSleepMapCityRanking (SomniGetSleepMapCityRankingReq) returns (SomniGetSleepMapCityRankingRes);
}

// ==================== AudioMaterialService ====================
// 音频原料 & 分类管理
// 对应表: audio_material_categories, audio_materials

service AudioMaterialService {
  // ----- 分类 -----
  rpc ListAudioMaterialCategories (ListAudioMaterialCategoriesReq) returns (AudioMaterialCategoryListRes);
  rpc GetAudioMaterialCategory (IdReq)                            returns (AudioMaterialCategoryRes);
  rpc CreateAudioMaterialCategory (CreateAudioMaterialCategoryReq) returns (EmptyRes);
  rpc UpdateAudioMaterialCategory (UpdateAudioMaterialCategoryReq) returns (EmptyRes);
  rpc DeleteAudioMaterialCategory (IdReq)                          returns (EmptyRes);

  // ----- 原料 -----
  rpc ListAudioMaterials (ListAudioMaterialsReq)                  returns (AudioMaterialListRes);
  rpc GetAudioMaterial (IdReq)                                    returns (AudioMaterialRes);
  rpc GetDistinctTags (EmptyReq)                                  returns (DistinctTagsRes);
  rpc CreateAudioMaterial (CreateAudioMaterialReq)                returns (EmptyRes);
  rpc UpdateAudioMaterial (UpdateAudioMaterialReq)                returns (EmptyRes);
  rpc UpdateAudioMaterialStatus (UpdateAudioMaterialStatusReq)    returns (EmptyRes);
  rpc DeleteAudioMaterial (IdReq)                                 returns (EmptyRes);
}

// ============================================================
//  通用消息
// ============================================================

message IdReq {
  string id = 1;
}

message EmptyReq {}

message EmptyRes {}

message CountRes {
  int64 count = 1;
}

// ============================================================
//  Quiz — 题库（题目）相关消息
// ============================================================

message QuestionOption {
  string option_id        = 1;
  string option_text      = 2;
  int32  sort_order       = 3;
  bool   is_input_enabled = 4;
}

// 配置子项：兼容 time/date_picker 的具名输入项 + composite 复合题的子题目
// - time/date_picker 仅使用 index/label/format
// - composite 仅使用 index/title/description/input_type/options/config/is_extra_input
message PickerItem {
  int32  index  = 3;  // 数组下标（0、1、2…），提交答题时直接使用
  string label  = 1;  // [picker] 具名输入标签，如「上床时间：」「起床时间：」
  string format = 2;  // [picker] 该项格式，如 HH:mm、HH、YYYY-MM-DD，每项可不同

  // [composite] 复合题子题目字段（同构于 QuestionInfo 的子集）
  string title                       = 4;  // 子题标签
  string description                 = 5;  // 子题描述
  string input_type                  = 6;  // 子题型（不能再是 composite）
  repeated QuestionOption options    = 7;  // 子题选项
  QuestionConfig config              = 8;  // 子题配置（自引用，proto 支持）
  bool   is_extra_input              = 9;  // 子题级追加输入开关
}

message QuestionConfig {
  int32  max_select_count = 1;   // multiple_choice
  string placeholder      = 2;   // text_input
  int32  max_length       = 3;   // text_input
  int32  min              = 4;   // number_input, slider
  int32  max              = 5;   // number_input, slider
  int32  step             = 6;   // number_input, slider
  string unit             = 7;   // number_input
  int32  max_value        = 8;   // rating
  bool   allow_half       = 9;   // rating
  repeated string levels  = 10;  // cascading_selector
  string data_source      = 11;  // cascading_selector
  map<string, string> labels = 12; // slider
  repeated PickerItem items = 14;  // time/date_picker 具名输入列表 / composite 复合题子题目列表
  string active_text   = 15;  // switch 开启文案
  string inactive_text = 16;  // switch 关闭文案
}

message QuestionInfo {
  string id                       = 1;
  string title                    = 2;
  string description              = 3;
  string input_type               = 4;   // single_choice, multiple_choice, text_input, etc.
  string business_type            = 5;   // sleep, vital_signs, nutrition, general
  string dimension                = 6;
  repeated QuestionOption options = 7;
  QuestionConfig config           = 8;
  repeated string tags            = 9;
  string language                 = 10;
  int32  status                   = 11;
  string create_time              = 12;
  string update_time              = 13;
  string scoring_type             = 14;  // score | label | none
  bool   is_extra_input           = 15;  // 题目级追加输入开关
}

message GetActiveQuestionsReq {
  string business_type = 1;
  string language      = 2;
}

message ListQuestionsReq {
  bionode.common.v1.PageRequest page = 1;  // page/page_size/keyword/order_by
  string business_type = 2;
  string input_type    = 3;
  string dimension     = 4;
  int32  status        = 5;   // -1 表示不筛选
  string language      = 6;
}

message CreateQuestionReq {
  string title                    = 1;
  string description              = 2;
  string input_type               = 3;
  string business_type            = 4;
  string dimension                = 5;
  repeated QuestionOption options = 6;
  QuestionConfig config           = 7;
  repeated string tags            = 8;
  string language                 = 9;
  bool   is_extra_input           = 10;
}

message UpdateQuestionReq {
  string id                       = 1;
  string title                    = 2;
  string description              = 3;
  string input_type               = 4;
  string business_type            = 5;
  string dimension                = 6;
  repeated QuestionOption options = 7;
  QuestionConfig config           = 8;
  repeated string tags            = 9;
  string language                 = 10;
  int32  status                   = 11;
  bool   is_extra_input           = 12;
}

message UpdateQuestionStatusReq {
  string id    = 1;
  int32  status = 2;
}

message QuestionRes {
  QuestionInfo question = 1;
}

message QuestionListRes {
  repeated QuestionInfo questions = 1;
  bionode.common.v1.PageResponse page = 2;
}

// ============================================================
//  Survey — 问卷编排相关消息
// ============================================================

message ItemDisplayRules {
  string depends_on_question_id = 1;  // 依赖的题目 ID
  string option_id              = 2;  // 触发显示的选项 ID（如 "A"）
}

message SurveyPageItem {
  string question_id            = 1;
  int32  sort_order             = 2;
  bool   is_required            = 3;
  string alias                  = 4;
  ItemDisplayRules display_rules = 5;  // 条件显示规则，为空则始终显示
}

message SurveyPage {
  int32  page_index               = 1;
  string page_title               = 2;
  string page_description         = 3;
  repeated SurveyPageItem items   = 4;
}

message SurveySettings {
  bool  allow_resume       = 1;
  bool  show_progress      = 2;
  bool  randomize_options  = 3;
  int32 time_limit_minutes = 4;
}

message CodeRuleOption {
  string option_id   = 1;
  int32  score       = 2;
  string label_value = 3;
}

message CodeRuleQuestion {
  string question_id                   = 1;
  repeated CodeRuleOption options      = 2;
}

message ThresholdItem {
  int32  min   = 1;
  int32  max   = 2;
  string label = 3;
}

message CodeRule {
  string code_key                          = 1;
  string rule_type                         = 2;
  int32  in_code                           = 3;
  repeated CodeRuleQuestion questions      = 4;
  repeated ThresholdItem thresholds        = 5;
  string default_label                     = 6;
}

message SurveyInfo {
  string id                       = 1;
  string title                    = 2;
  string code                     = 3;
  string description              = 4;
  string business_type            = 5;
  string cover_image              = 6;
  repeated SurveyPage pages       = 7;
  SurveySettings settings         = 8;
  int32 total_question_count      = 9;
  repeated CodeRule rule_config   = 10;
  string language                 = 11;
  int32  status                   = 12;
  string create_time              = 13;
  string update_time              = 14;
}

message GetSurveyReq {
  string id = 1;
}

message GetSurveyByCodeReq {
  string code     = 1;
  string language = 2;
}

message ListSurveysReq {
  bionode.common.v1.PageRequest page = 1;
  string business_type = 2;
  int32  status        = 3;
  string language      = 4;
}

message CreateSurveyReq {
  string title                    = 1;
  string code                     = 2;
  string description              = 3;
  string business_type            = 4;
  string cover_image              = 5;
  repeated SurveyPage pages       = 6;
  SurveySettings settings         = 7;
  string language                 = 8;
  repeated CodeRule rule_config   = 9;
}

message UpdateSurveyReq {
  string id                       = 1;
  string title                    = 2;
  string code                     = 3;
  string description              = 4;
  string business_type            = 5;
  string cover_image              = 6;
  repeated SurveyPage pages       = 7;
  SurveySettings settings         = 8;
  string language                 = 9;
  int32  status                   = 10;
  repeated CodeRule rule_config   = 11;
}

message UpdateSurveyStatusReq {
  string id    = 1;
  int32  status = 2;
}

message SurveyRes {
  SurveyInfo survey = 1;
}

message SurveyListRes {
  repeated SurveyInfo surveys = 1;
  bionode.common.v1.PageResponse page = 2;
}

// 带完整题目的问卷（H5 拉取用）
message SurveyPageWithQuestions {
  int32  page_index                   = 1;
  string page_title                   = 2;
  string page_description             = 3;
  repeated QuestionWithMeta questions = 4;
}

message DisplayRules {
  string depends_on              = 1;  // 依赖题目的 alias（如 "Q7"）
  string depends_on_question_id  = 2;  // 依赖题目的 question_id
  string show_when_option        = 3;  // 当依赖题目选中此 option_id 时显示
}

message QuestionWithMeta {
  QuestionInfo question  = 1;
  int32  sort_order      = 2;
  bool   is_required     = 3;
  string alias           = 4;
  DisplayRules display_rules = 5;
}

message SurveyWithQuestionsRes {
  SurveyInfo survey                       = 1;
  repeated SurveyPageWithQuestions pages  = 2;
}

// ============================================================
//  Quiz — 答题相关消息
// ============================================================

message AnswerSelectedOption {
  string opt_id       = 1;  // 选项/输入槽位 ID（选择类为 option_id 如 A，time/date 为下标如 0）
  string opt_text     = 2;  // 展示文本（后台自动补全）
  double score        = 3;
  string label_value  = 4;
  string input_value  = 5;
}

message AnswerDetail {
  string question_id                                 = 1;
  string value_json                                  = 7;  // 统一答案，JSON：选择类=["A"]，time/date=[{opt_id,input_value}]，numeric=60
  string title                                       = 5;
  repeated string selected_options                   = 2;  // 内部解析后填充，用于计分与存储
  string input_value                                 = 3;
  double numeric_value                               = 4;
  repeated AnswerSelectedOption opt_snapshots        = 6;
}

message AnswerInfo {
  string id                       = 1;
  string uid                      = 2;
  string survey_id                = 3;
  string survey_code              = 4;
  string language                 = 5;
  repeated AnswerDetail answers   = 6;
  bool   is_completed             = 7;
  string record_date              = 8;
  string create_time              = 9;
  string update_time              = 10;
  string nickname                 = 11;
  string avatar_url               = 12;
}

message SaveAnswerReq {
  string uid                      = 1;
  string survey_code              = 2;
  repeated AnswerDetail answers   = 3;
}

message GetAnswerProgressReq {
  string uid         = 1;
  string survey_code = 2;
}

message AnswerRes {
  AnswerInfo answer = 1;
}

message ListAnswersReq {
  bionode.common.v1.PageRequest page = 1;
  string uid          = 2;
  string survey_code  = 3;
  int32  is_completed = 4;
  string start_date   = 5;
  string end_date     = 6;
}

message AnswerListRes {
  repeated AnswerInfo answers = 1;
  bionode.common.v1.PageResponse page = 2;
}

// ============================================================
//  Quiz — 测评结果相关消息
// ============================================================

message Indicators {
  int32 circadian   = 1;
  int32 sensitivity = 2;
  int32 brain_state = 3;
  int32 atmosphere  = 4;
}

message ImproveScene {
  string type        = 1;
  string name        = 2;
  string description = 3;
  string config      = 4;
}

message ImprovePlan {
  string phase                     = 1;
  string phase_name                = 2;
  repeated ImproveScene scenes     = 3;
  string description               = 4;
}

message ScoreDetailEntry {
  string dimension = 1;
  int32  score     = 2;
}

message QuizResultInfo {
  string id                              = 1;
  string uid                             = 2;
  string survey_id                       = 3;
  string survey_code                     = 4;
  string answer_id                       = 5;
  repeated string mhr_codes              = 6;
  string mhr_name                        = 7;
  string atmosphere                      = 8;
  repeated string tags                   = 9;
  string comment                         = 10;
  Indicators indicators                  = 11;
  string analysis_insight                = 12;
  double population_ratio                = 13;
  repeated ImprovePlan improve_plan      = 14;
  repeated ScoreDetailEntry score_detail = 15;
  string create_time                     = 16;
  string update_time                     = 17;
  string nickname                        = 18;
  string avatar_url                      = 19;
  // 人格快照字段
  string identity_name                           = 20;
  string character_3d_url                        = 21;
  string status_analysis                         = 22;
  IndicatorDescriptions indicator_descriptions   = 23;
  ShareConfig share_config                       = 24;
  // 用户字段
  string openid                                  = 25;
  int32  gender                                  = 26;
}

message ComputeMhrCodesReq {
  string survey_code              = 1;
  repeated AnswerDetail answers   = 2;
}

message ComputeMhrCodesRes {
  repeated string mhr_codes = 1;
}

message SubmitQuizReq {
  string uid         = 1;
  string survey_code = 2;
  string answer_id   = 3;
  string language    = 4;  // 语言标识（zh/en），用于查询对应语言的人格配置
}

message GetLatestResultReq {
  string uid         = 1;
  string survey_code = 2;
}

message GetResultByIdReq {
  string result_id = 1;  // 结果 ID（MongoDB ObjectId）
}

message ListResultsReq {
  bionode.common.v1.PageRequest page = 1;
  string uid                 = 2;
  string survey_code         = 3;
  repeated string mhr_codes  = 4;
  string mhr_name            = 5;
}

message QuizResultRes {
  QuizResultInfo result = 1;
}

message QuizResultListRes {
  repeated QuizResultInfo results = 1;
  bionode.common.v1.PageResponse page = 2;
}

// ============================================================
//  Quiz — 人格配置相关消息
// ============================================================

message IndicatorDescriptions {
  string circadian   = 1;
  string sensitivity = 2;
  string brain_state = 3;
  string atmosphere  = 4;
}

message SceneItem {
  string type        = 1;
  string name        = 2;
  string description = 3;
  string config      = 4;
}

// ----- 控制台 Scheme 子结构（新格式） -----

message SchemeColorStop {
  int32 r          = 1;
  int32 g          = 2;
  int32 b          = 3;
  int32 ww         = 4;
  int32 cw         = 5;
  int32 lux        = 6;
  bool  enabled    = 7;
}

message SchemeLight {
  string mode                          = 1;
  repeated SchemeColorStop color_stops = 2;
