// ----- Somni Quiz AI 对话问卷（HTTP /app/quiz/chat 对应此 RPC） -----

message SomniQuizPendingOption {
  string option_id   = 1;
  string option_text = 2;
}

// 与 proto/somni_quiz.proto 中 ConfigItemConfig 对齐（composite 子项 slider 等）
message SomniQuizConfigItemConfig {
  int32 min  = 1;
  int32 max  = 2;
  int32 step = 3;
}

message SomniQuizPendingQuestionConfigItem {
  int32 index        = 1;
  string label       = 2;
  string format      = 3;
  // composite 子项（与 somni_quiz PendingQuestionConfigItem 对齐）
  string title                            = 4;
  string input_type                       = 5;
  string description                      = 6;
  repeated SomniQuizPendingOption options = 7;
  SomniQuizConfigItemConfig config        = 8;
}

message SomniQuizPendingQuestionConfig {
  repeated SomniQuizPendingQuestionConfigItem items = 1;
}

message SomniQuizPendingQuestion {
  string question_id                              = 1;
  string qid                                      = 2;
  string title                                    = 3;
  string input_type                               = 4;
  repeated string tags                            = 5;
  repeated SomniQuizPendingOption options         = 6;
  SomniQuizPendingQuestionConfig config             = 7;
}

message SomniQuizDirectAnswerIn {
  string question_id               = 1;
  repeated string selected_options = 2;
  string input_value               = 3;
}

// Somni ChatQuiz final_result.report_sections 片段（完成态睡眠报告等）
message SomniQuizReportSection {
  string title   = 1;
  string content = 2;
}

message SomniQuizChatReq {
  string client_session_id = 1;
  bool resume              = 2;
  string survey_code       = 3;
  string language          = 4;
  string message           = 5;
  SomniQuizDirectAnswerIn direct_answer = 6;
  string app_instance_id   = 7;
  /** 仅新建 BioNode 会话时供 InitQuiz 使用；Somni ChatQuiz 不传 quiz_mode */
  string quiz_mode         = 8;
  /** 城市名称，InitQuiz 时传入 */
  string city_name         = 9;
  /** 经纬度，预留 */
  double longitude         = 10;
  double latitude          = 11;
}

message SomniQuizChatRes {
  string client_session_id                      = 1;
  string assistant_message                      = 2;
  SomniQuizPendingQuestion pending_question     = 3;
  bool finalized                                = 4;
  string session_id                             = 5;
  string uid                                    = 6;
  bool chat_state                               = 7;
  double progress_percent                       = 8;
  repeated string mhr_codes                     = 9;
  /** 与外部 Somni ChatQuiz 对齐：RECORDED | UPDATED | PARTIAL | NOT_RECORDED 等 */
  string answer_status_code                     = 10;
  /** 完成态 final_result.report_sections（共情解读、问题归因等）；未结束时为空 */
  repeated SomniQuizReportSection report_sections = 11;
}

// ============================================================
//  InterventionConfig — 干预配置相关消息
// ============================================================

message InterventionCondition {
  string kind     = 1;  // phase_in | env_threshold | metric_threshold | presence_required
  repeated string phases = 2;  // kind=phase_in 时使用
  string field    = 3;  // kind=env_threshold/metric_threshold 时使用
  string operator = 4;  // gt | gte | lt | lte | eq
  double value    = 5;  // 阈值数值
  bool   bool_value = 6; // kind=presence_required 时使用
}

message InterventionScenario {
  string light_json = 1;  // SchemeV1 Light JSON 字符串
  string sound_json = 2;  // SchemeV1 Sound JSON 字符串
  string scent_json = 3;  // SchemeV1 Scent JSON 字符串
  int32  duration_sec = 4; // 干预持续时长（秒）
  int32  transition_sec = 5; // 光渐变过渡时长（秒）
}

message InterventionConfigInfo {
  string id              = 1;
  string code            = 2;
  string name            = 3;
  bool   enabled         = 4;
  int32  priority        = 5;
  int32  cooldown_sec    = 6;
  string condition_logic = 7;  // any | all
  repeated InterventionCondition conditions = 8;
  InterventionScenario scenario = 9;
  int32  sort_order      = 10;
  string create_time     = 11;
  string update_time     = 12;
  bool   show            = 13;  // 是否在控制台事件控制列表中显示
  string event_type      = 14;  // oneshot | continuous
}

message ListInterventionConfigsReq {}

message InterventionConfigListRes {
  repeated InterventionConfigInfo list = 1;
}

message UpsertInterventionConfigReq {
  string id              = 1;  // 空则新建，非空则更新
  string code            = 2;
  string name            = 3;
  bool   enabled         = 4;
  int32  priority        = 5;
  int32  cooldown_sec    = 6;
  string condition_logic = 7;
  repeated InterventionCondition conditions = 8;
  InterventionScenario scenario = 9;
  int32  sort_order      = 10;
  bool   show            = 11;
  string event_type      = 12;  // oneshot | continuous
}

message InterventionConfigRes {
  InterventionConfigInfo config = 1;
}

message TriggerInterventionReq {
  string session_id = 1;
  string code       = 2;
}

message StopInterventionReq {
  string session_id = 1;
}

// ============================================================
//  Somni — 监控页查询接口 Message
// ============================================================

// ==================== GetPlanPhases ====================

message SomniGetPlanPhasesReq {
  string session_id = 1;
}

message SomniPlanPhaseItem {
  string phase              = 1;
  string phase_name         = 2;
  int32  duration_minutes   = 3;
  string light_description  = 4;
  string sound_description  = 5;
  string scent_description  = 6;
  string temp_description   = 7;  // 温干预说明
}

message SomniGetPlanPhasesRes {
  repeated SomniPlanPhaseItem phases = 1;
}

// ==================== GetInterventionEvents ====================

message SomniGetInterventionEventsReq {
  string session_id = 1;
}

message SomniInterventionEventItem {
  string time             = 1;
  string event_type       = 2;
  string type             = 3;
  string code             = 4;
  string trigger_cause    = 5;
  string action_taken     = 6;
  string result_summary   = 7;
  string related_event_id = 8;
  string duration         = 9;  // HH:mm:ss 格式的事件持续时长
}

message SomniGetInterventionEventsRes {
  repeated SomniInterventionEventItem events = 1;
}

// ==================== GetMonitorReportData ====================

message SomniGetMonitorReportDataReq {
  string session_id  = 1;
  /** "real"（默认）从 MongoDB 读真实数据；"fake" 从 Redis 读展示数据 */
  string data_source = 2;
}

message SomniGenerateMonitorDphReportsReq {
  string session_id = 1;
}

message SomniGenerateMonitorDphReportsRes {
  bool   success = 1;
  string error   = 2;
}

message PhysiologicalDataPoint {
  string time             = 1;
  double heart_rate       = 2;
  double respiration_rate = 3;
  double body_motion      = 4;
}

message EnvironmentDataPoint {
  string time        = 1;
  double temperature = 2;
  double humidity    = 3;
  double illuminance = 4;
  double noise       = 5;
}

message InterventionSummary {
  int32  total_count        = 1;
  repeated SomniInterventionEventItem events = 2;
}

// ---- 人格亮点 & 异常分级（睡眠报告增强） ----

message PersonalityHighlight {
  string tag     = 1;
  string title   = 2;
  string subhead = 3;
  string details = 4;
}

message RadarMetrics {
  string time             = 1;  // 拐点时间（HH:mm，对应 physiological_series.time）
  int32  T_resistance_sec = 2;  // 从开始到拐点的秒数
  double HR_initial       = 3;  // 拐点前心率均值
  double HR_stable        = 4;  // 拐点后稳定心率
  double RR_initial       = 5;
  double RR_stable        = 6;
  double body_motion      = 7;  // 拐点时刻体动幅度（百分比 0-100）
}

message RadarResult {
  string status                = 1;  // MATCHED / ANOMALY / PERFECT
  PersonalityHighlight highlight = 2;
  RadarMetrics metrics         = 3;
}

message AnomalySegment {
  int64  start_ts   = 1;
  int64  end_ts     = 2;
  string type       = 3;  // data_gap / presence_false
  string label      = 4;
  string start_time = 5;  // HH:mm，对应 physiological_series.time
  string end_time   = 6;
}

message AnomalyStatus {
  string status                             = 1;  // MATCHED / ANOMALY / PERFECT（与 RadarResult.status 同步）
  string level                              = 2;  // normal / light / severe
  string message                            = 3;
  bool   session_completed                  = 4;
  repeated AnomalySegment anomaly_segments  = 5;
}

// ---- 报告底部卡片 & 方案概览 ----

message EnvironmentCardSeries {
  repeated double series = 1;
  double avg             = 2;
}

message ClimateCard {
  EnvironmentCardSeries temperature = 1;
  EnvironmentCardSeries humidity    = 2;
}

message EnvironmentCards {
  ClimateCard          climate          = 1;
  EnvironmentCardSeries ambient_light    = 2;  // 光照度
  EnvironmentCardSeries acoustic_masking = 3;  // 噪声
  EnvironmentCardSeries air_conditioner  = 4;  // 空调目标温度（4 阶段）
}

message PlanOverviewRgb {
  int32 r = 1;
  int32 g = 2;
  int32 b = 3;
}

message PlanOverviewScent {
  string scent_icon = 1;
  string type       = 2;
}

message PlanOverviewLightPhase {
  string phase = 1;
  repeated PlanOverviewRgb color_stops = 2;
}

message PlanOverviews {
  reserved 1;
  reserved "light_color_stops";
  repeated PlanOverviewScent scent = 2;
  repeated string sound = 3;
  repeated PlanOverviewLightPhase light_phases = 4;
}

message SomniQuizUserProfileSleepWakeTime {
  string sleep_time = 1;  // HH:mm
  string wake_time  = 2;
}

/** 问卷完成态 user_profile（Redis somni:quiz:user_profile:session:{sessionId}） */
message SomniQuizUserProfile {
  string name              = 1;
  string daytime_event     = 2;
  string improvement_goal  = 3;
  SomniQuizUserProfileSleepWakeTime usual_sleep_wake_time = 4;
}

message SomniGetMonitorReportDataRes {
  repeated PhysiologicalDataPoint physiological_series = 1;
  repeated EnvironmentDataPoint environment_series     = 2;
  InterventionSummary intervention_summary             = 3;
  RadarResult radar_result                             = 4;
  AnomalyStatus anomaly_status                         = 5;
  EnvironmentCards environment_cards                    = 6;
  PlanOverviews plan_overviews                         = 7;
  /** 问卷 user_profile；Redis 无缓存时不返回 */
  SomniQuizUserProfile user_profile                    = 8;
}

// ==================== GetSessionContext ====================

message SomniGetSessionContextReq {
  string session_id = 1;
}

message SomniSessionContextPlanPhase {
  string phase              = 1;
  string phase_name         = 2;
  int32  duration_sec       = 3;
  int32  transition_sec     = 4;
  int32  duration_minutes   = 5;
  string schemes_json       = 6;  // schemes 数组的 JSON 字符串，结构与人格 periods[].schemes 一致
  string description        = 7;
}

message SomniGetSessionContextRes {
  repeated string mhr_codes                        = 1;
  repeated SomniSessionContextPlanPhase plan_phases = 2;
}

// ============================================================
//  ChatMessage — 对话记录相关消息
// ============================================================

message ChatMessageInfo {
  string id                = 1;
  string conversation_id   = 2;
  string biz_type          = 3;
  int32  message_index     = 4;
  string role              = 5;   // system | user | assistant
  string content_json      = 6;   // content 序列化为 JSON 字符串（Mixed 类型）
  string meta_data_json    = 7;   // meta_data 序列化为 JSON 字符串（Mixed 类型）
  string create_time       = 8;
}

message GetChatMessagesReq {
  string conversation_id = 1;
}

message ChatMessageListRes {
  repeated ChatMessageInfo list = 1;
}

message ChatConversationItem {
  string conversation_id    = 1;
  string biz_type           = 2;
  int32  message_count      = 3;
  string first_message_time = 4;
  string last_message_time  = 5;
}

message ListChatConversationsReq {
  string biz_type    = 1;
  string start_time  = 2;
  string end_time    = 3;
  bionode.common.v1.PageRequest page = 4;
}

message ListUserChatConversationsReq {
  string uid        = 1;
  string biz_type   = 2;
  bionode.common.v1.PageRequest page = 3;
}

message ChatConversationListRes {
  repeated ChatConversationItem conversations = 1;
  bionode.common.v1.PageResponse page = 2;
}

// ============================================================
//  Somni — 临时方案相关消息
// ============================================================

message SomniGetTempPlanReq {
  repeated string mhr_codes = 1;
  string language            = 2;
  string type                = 3;  // init | interv，默认 init
}

message SomniGetTempPlanRes {
  bool   found    = 1;
  string title    = 2;
  string subtitle = 3;
  string phases   = 4;  // JSON: phases 数组
}

// ============================================================
//  Somni 对话 — 音频上传
// ============================================================

message UploadChatAudioReq {
  bytes  audio_data = 1;  // 音频二进制数据（PCM 16kHz 16bit mono）
  string prefix     = 2;  // 存储目录前缀，如 "somni/chat/audio"
}

message UploadChatAudioRes {
  string audio_url = 1;  // CDN URL
}

// ============================================================
//  Somni 对话 — 消息落库
// ============================================================

message AppendChatMessageReq {
  string conversation_id = 1;  // 会话标识
  string biz_type         = 2;  // 业务类型（somni_chat）
  string role             = 3;  // system / user / assistant
  string content_json     = 4;  // content 序列化为 JSON 字符串
  string meta_data_json   = 5;  // meta_data 序列化为 JSON 字符串
}

// ============================================================
//  Somni — 睡眠地图
// ============================================================

message SomniSleepMapRegion {
  string province_code = 1;
  string city_code     = 2;
  string district_code = 3;
  string province      = 4;  // 展示名（随请求 language）
  string city          = 5;
  string district      = 6;
  string full_path     = 7;  // 当前粒度完整路径（与 name 同语言）
}

/** value_json / city_avg_json：JSON 编码后的数字或字符串，与 dimensions.value / city_avg 对齐 */
message SomniSleepMapDimensionGrpc {
  double score           = 1;
  double weight          = 2;
  string value_json      = 3;
  string city_avg_json   = 4;
  double city_score      = 5;
}

message SomniSleepMapDimensionsGrpc {
  SomniSleepMapDimensionGrpc deep_sleep         = 1;
  SomniSleepMapDimensionGrpc sleep_duration      = 2;
  SomniSleepMapDimensionGrpc sleep_efficiency     = 3;
  SomniSleepMapDimensionGrpc abnormal_events    = 4;
  SomniSleepMapDimensionGrpc routine_regularity = 5;
}

message SomniSleepMapAnalysisGrpc {
  string aid                  = 1;   // somni_sleep_analysis._id（hex）
  string uid                  = 2;
  string stats_date           = 3;
  SomniSleepMapRegion region   = 4;
  string user_name            = 5;
  double score                = 6;
  double sleep_seconds        = 7;
  double deep_sleep_seconds   = 8;
  double deep_sleep_ratio     = 9;   // 响应中为 0~100 整数百分比（相对 DB 0~1）
  string evaluation           = 10;
  SomniSleepMapDimensionsGrpc dimensions = 11;
  bool   is_env_sensitive     = 12;
}

message SomniSleepMapDistrictGrpc {
  SomniSleepMapRegion region = 1;
  double score               = 2;   // 综合得分均值，整数（睡眠地图概况）
  double sleep_seconds       = 3;
  double deep_sleep_ratio    = 4;   // 深睡占比，0~100 整数百分比（相对数据库中 0~1 小数）
  double sensitive_user_ratio = 5; // 环境敏感人群占比，0~100 整数百分比
  string heatmap_url         = 6;
}

message SomniSleepMapCitySummaryGrpc {
  SomniSleepMapRegion region = 1;
  double avg_comprehensive_score = 2;  // 全市下辖各区 score 算术均值，取整
  int32  score_beat_count        = 3;  // 同城同日得分低于当前用户的人数
  int32  deep_ratio_beat_count   = 4;  // 同城同日深睡占比（DB 0~1）低于当前用户的人数
}

message SomniGetSleepMapCityOverviewReq {
  string uid           = 1;
  string stats_date    = 2;
  string language      = 3;  // zh | en，默认 zh
  string province_code = 4;
  string city_code     = 5;
  string district_code = 6;
}

message SomniGetSleepMapCityOverviewRes {
  string stats_date              = 1;
  bool   found_focus_district    = 2;
  SomniSleepMapDistrictGrpc focus_district = 3;
  SomniSleepMapCitySummaryGrpc city_summary = 4;
}

message SomniGetSleepMapHighlightsReq {
  string uid        = 1;  // 当前登录用户（鉴权）
  string aid        = 2;  // somni_sleep_analysis._id（hex）；空则按 uid + stats_date 查本人当日分析
  string stats_date = 3;
  string language   = 4;  // zh | en，默认 zh
}

message SomniGetSleepMapHighlightsRes {
  bool   found                     = 1;
  SomniSleepMapAnalysisGrpc analysis = 2;
  int32  city_rank                 = 3;
  int32  beat_ratio                = 4;  // 超越占比，0~100 整数（百分比）；同城全日排名中优于其他人所占比例
  bool   is_self                   = 5;
}

message SomniSleepMapLeaderboardRowGrpc {
  int32  rank               = 1;
  string uid                = 2;
  string aid                = 3;  // 该行对应 somni_sleep_analysis._id（hex）
  string user_name          = 4;
  double deep_sleep_seconds = 5;
  double sleep_seconds      = 6;
  double score              = 7;
  bool   is_self            = 8;
}

message SomniSleepMapCurrentUserSummaryGrpc {
  double score              = 1;
  double deep_sleep_seconds = 2;
  double sleep_seconds      = 3;
  string evaluation         = 4;
  int32  city_rank          = 5;
  string aid                = 6;  // 当前登录用户当日分析的 somni_sleep_analysis._id；无分析为空
}

message SomniGetSleepMapCityRankingReq {
  string uid        = 1;
  string stats_date = 2;
  int32  limit      = 3;
  string language   = 4;  // zh | en，默认 zh
}

message SomniGetSleepMapCityRankingRes {
  string stats_date                           = 1;
  SomniSleepMapRegion filter_region           = 2;
  repeated SomniSleepMapLeaderboardRowGrpc leaderboard = 3;
  SomniSleepMapCurrentUserSummaryGrpc current_user_summary = 4;
}
