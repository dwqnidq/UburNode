syntax = "proto3";

// 公共骨架 message — 被 4 个 bionode_*.proto 引用
//
// 设计原则（与 docs/architecture/proto-style-guide.md 同源）：
// 1. AIP-122 标准方法的入参/出参共用结构由本文件定义；
// 2. 所有持久化资源的审计字段统一用 Metadata；
// 3. 列表接口统一用 PageRequest / PageResponse；
// 4. 任何「成功 / 失败 + 提示」语义的简单返回统一用 OperationResponse；
// 5. 任何「N 个 ID」入参统一用 IdsRequest（禁止逗号分隔字符串）。
//
// 关于版本：本文件仍属 v1，与现有 4 个业务 proto 同步演进。
// 字段号管理规则：见 .cursor/rules/grpc-service.mdc（PR5 重写）。
package bionode.common.v1;

// 空消息。语义等价于 google.protobuf.Empty，但显式定义在 BioNode 包内
// 便于未来按需扩展（如增加 trace_id / request_id 等公共字段）而不破坏现有 RPC。
message Empty {}

// 单 ID 请求
message IdRequest {
  // MongoDB ObjectId 字符串（24 字符 hex）
  string id = 1;
}

// N 个 ID 请求（取代旧 admin proto 的 IdsRequest{ string ids = 1; // 逗号分隔 }）
message IdsRequest {
  repeated string ids = 1;
}

// 列表分页 / 过滤入参
//
// AIP-158 的简化版本：保留 page/page_size 而不切换 page_token，
// 因为 BioNode 前端早已用 page/page_size 形态，本次重构在 BFF 层做兼容映射，
// proto 内部按规范来即可。
message PageRequest {
  // 页码（从 1 开始，默认 1）
  int32 page = 1;
  // 每页条数（默认 10，最大 100）
  int32 page_size = 2;
  // 通用关键词（模糊搜索，可选）
  string keyword = 3;
  // 排序表达式：形如 "create_time desc" 或 "name asc"
  // 解析规则在各 service 实现，无统一字段映射保证
  string order_by = 4;
}

// 列表分页响应公共块
message PageResponse {
  // 总条数
  int32 total = 1;
  // 当前页码（回显）
  int32 page = 2;
  // 当前页大小（回显）
  int32 page_size = 3;
  // 总页数
  int32 total_pages = 4;
}

// 资源审计字段三件套
// 所有持久化资源 Message 必须嵌入 Metadata metadata = N; 字段（PR4 起强制）
message Metadata {
  // 业务状态：1=启用，0=禁用，其余值由各业务自定义
  int32 status = 1;
  // 创建时间，ISO 8601 UTC（如 2026-04-02T15:30:00.000Z）
  string create_time = 2;
  // 更新时间，ISO 8601 UTC
  string update_time = 3;
}

// 通用「成功/失败 + 提示」响应
//
// 取代 device-gateway proto 中各 *Res 重复的 { bool ok = 1; string msg = 2; } 模式。
// 不要滥用：有具体业务返回值的 RPC 仍应定义专属 Response。
message OperationResponse {
  bool ok = 1;
  string msg = 2;
}

// 选项树（admin 用于下拉、级联）
message OptionItem {
  string value = 1;
  string label = 2;
  repeated OptionItem children = 3;
}

// 业务错误详情（可选作为 Response 字段携带）
//
// 注意：本 message 不强制使用。
// gRPC 错误首选仍走 throw BusinessException → GrpcExceptionFilter →
// gRPC trailing metadata（com.google.rpc.Status）。本 Error 仅用于
// 「成功调用但部分子项失败」的批处理场景。
message Error {
  // 业务错误码（与 libs/common/src/exceptions/error-code.enum.ts 对齐）
  string code = 1;
  // 用户可读错误信息
  string message = 2;
  // 详情（JSON 字符串），如校验失败的字段列表
  string details_json = 3;
}
